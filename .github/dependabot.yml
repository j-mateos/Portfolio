version: 2
updates:
  # Settings for the project dependencies
  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'monthly'
    groups:
      react-dependencies:
        patterns:
          - '*'
    open-pull-requests-limit: 1

  # Settings for GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 1
